services:
  - type: web
    name: nn-audio-backend
    runtime: node
    buildCommand: npm install --include=dev && npm run db:generate && npm run build && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nn-audio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      # SMTP — transactional email (Gmail / Resend / SendGrid)
      # Set EMAIL_USER + EMAIL_PASS in the Render dashboard to enable all emails
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_NOTIFY_EMAIL
        sync: false

databases:
  - name: nn-audio-db
    databaseName: nn_audio
    plan: free
