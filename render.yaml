services:
  # ─── Production Backend ───────────────────────────────────────────────────
  # Deployed via GitHub Actions deploy-production.yml (push to main)
  # autoDeploy: false — controlled by GitHub Actions deploy hook
  # ──────────────────────────────────────────────────────────────────────────
  - type: web
    name: nn-audio-backend
    runtime: node
    rootDir: backend
    branch: main
    buildCommand: npm install --include=dev && npm run db:generate && npm run build && npx prisma db push
    startCommand: npm start
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nn-audio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: PORT
        value: 5000
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_NOTIFY_EMAIL
        sync: false

  # ─── Staging Backend ──────────────────────────────────────────────────────
  # Deployed via GitHub Actions deploy-staging.yml (push to develop)
  # Uses test Razorpay keys + staging database — never production credentials
  # autoDeploy: false — controlled by GitHub Actions deploy hook
  # ──────────────────────────────────────────────────────────────────────────
  - type: web
    name: nn-audio-backend-staging
    runtime: node
    rootDir: backend
    branch: develop
    buildCommand: npm install --include=dev && npm run db:generate && npm run build && npx prisma db push
    startCommand: npm start
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: staging
      - key: DATABASE_URL
        fromDatabase:
          name: nn-audio-db-staging
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false           # ⚠️  Must be rzp_test_* — NEVER live key in staging
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: PORT
        value: 5000
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_NOTIFY_EMAIL
        sync: false

databases:
  # ─── Production Database ──────────────────────────────────────────────────
  - name: nn-audio-db
    databaseName: nn_audio
    plan: free

  # ─── Staging Database ─────────────────────────────────────────────────────
  # Completely separate from production — safe to wipe & reseed during testing
  - name: nn-audio-db-staging
    databaseName: nn_audio_staging
    plan: free
