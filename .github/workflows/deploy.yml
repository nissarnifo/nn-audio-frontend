name: CI

# ─────────────────────────────────────────────────────────────────────────────
# Runs on every push to every branch and on PRs targeting develop or main.
# Ensures code quality gates pass before any deployment.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint & Type Check
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Build Check (uses staging env by default, safe dummy fallbacks)
# ─────────────────────────────────────────────────────────────────────────────
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint
    env:
      NEXT_PUBLIC_API_URL: ${{ vars.STAGING_API_URL || 'http://localhost:5000/api/v1' }}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ vars.STAGING_RAZORPAY_KEY_ID || 'rzp_test_dummy' }}
      NEXTAUTH_URL: 'http://localhost:3000'
      NEXTAUTH_SECRET: 'build-check-secret-32chars-placeholder'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run build
