name: Deploy to Production

# ─────────────────────────────────────────────────────────────────────────────
# Triggers ONLY on push to `main` (i.e., after a PR is merged from develop).
#
# What it does:
#   1. Runs full CI quality gate with production env vars
#   2. Triggers the Render production backend deploy via deploy hook
#   3. Vercel auto-deploys main to production automatically (no step needed)
#   4. Posts a deployment summary
#
# Required GitHub Secrets (repo → Settings → Secrets → Actions):
#   RENDER_PRODUCTION_DEPLOY_HOOK  — Render deploy hook URL for production service
#   NEXT_PUBLIC_API_URL            — https://nn-audio-backend.onrender.com/api/v1
#   NEXT_PUBLIC_RAZORPAY_KEY_ID    — rzp_live_XXXXXXXXXX  (live key for production)
#   NEXTAUTH_URL                   — https://your-production-domain.com
#   NEXTAUTH_SECRET                — Production NextAuth secret (32+ chars)
#
# Required GitHub Variables (repo → Settings → Variables → Actions):
#   PRODUCTION_FRONTEND_URL        — https://your-production-domain.com
#   PRODUCTION_API_URL             — https://nn-audio-backend.onrender.com/api/v1
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Quality Gate (must pass before deploying to production)
# ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: Quality Gate
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy Backend to Production (Render)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Production (Render)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Trigger Render Production Deploy
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK }}")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Production deploy triggered (HTTP $HTTP_STATUS)"
          else
            echo "❌ Render deploy hook failed with HTTP $HTTP_STATUS"
            exit 1
          fi

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Create GitHub Release Tag
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release tag
        id: tag
        run: |
          RELEASE_TAG="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $RELEASE_TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "Release ${{ steps.tag.outputs.tag }}" \
            --notes "Deployed to production from commit ${{ github.sha }}" \
            --latest

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Post Deployment Summary
# ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Write summary
        run: |
          echo "## ✅ Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Vercel) | ${{ vars.PRODUCTION_FRONTEND_URL }} | Auto-deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend API (Render) | ${{ vars.PRODUCTION_API_URL }} | Deploying |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`main\` → Production" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
